<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NovaLua Obfuscator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>NovaLua</h1>
    <p>Advanced Roblox Lua Obfuscator</p>
</header>

<main>
    <section class="editor">
        <div class="box">
            <h2>Input</h2>
            <textarea id="inputCode" placeholder="Paste your Lua script here..."></textarea>
        </div>

        <div class="box">
            <h2>Output</h2>
            <textarea id="outputCode" readonly></textarea>
        </div>
    </section>

    <div class="controls">
        <select id="mode">
            <option value="light">Light Obfuscation</option>
            <option value="medium">Medium Obfuscation</option>
            <option value="strong">Strong Obfuscation</option>
        </select>

        <button id="runBtn">Obfuscate</button>
    </div>
</main>

<footer>
    <p>NovaLua © 2026 — Built for creators</p>
</footer>

<script src="app.js"></script>
</body>
</html>
